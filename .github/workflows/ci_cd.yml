name: Full Self-Contained CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  full-pipeline:
    runs-on: ubuntu-latest

    env:
      CMDSTAN_VERSION: "2.33.1"
      ENABLE_PROPHET: "0"      # Keep 0 in CI — Prophet compile takes 15+ min

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache CmdStan
        if: env.ENABLE_PROPHET == '1'
        uses: actions/cache@v4
        with:
          path: ~/.cmdstan
          key: ${{ runner.os }}-cmdstan-${{ env.CMDSTAN_VERSION }}
          restore-keys: ${{ runner.os }}-cmdstan-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential g++ gcc make

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip setuptools==68.2.2 wheel
          pip install tqdm mlflow
          pip install -r requirements.txt
          if [ "${ENABLE_PROPHET}" = "1" ]; then
            pip install -r requirements-prophet.txt
          fi

      - name: Install CmdStan
        if: env.ENABLE_PROPHET == '1'
        run: |
          python - <<'PY'
          import cmdstanpy, os
          os.environ["CXXFLAGS"] = "-O0 -g0 -std=c++14"
          os.environ["MAKEFLAGS"] = "-j2"
          cmdstanpy.install_cmdstan(
              version="2.33.1",
              dir=os.path.expanduser("~/.cmdstan"),
              overwrite=True, progress=True
          )
          cmdstanpy.set_cmdstan_path(os.path.expanduser("~/.cmdstan/cmdstan-2.33.1"))
          print(f"CmdStan installed: {cmdstanpy.cmdstan_path()}")
          PY

      # Upgrade MLflow DB schema before running pipeline
      - name: Upgrade MLflow DB schema (only if needed)
        run: |
          if [ -s mlflow.db ]; then
            echo "Upgrading MLflow DB schema..."
            mlflow db upgrade sqlite:///mlflow.db
          else
            echo "mlflow.db does not exist or is empty. Skipping upgrade."
          fi

      # Run baseline model (fast — no Prophet compile needed)
      # Date range: 3 months — long enough for drift detector to accumulate signal
      - name: Run pipeline (baseline mode)
        run: |
          MODEL_TYPE=baseline python pipeline.py \
            --start 2025-07-01 \
            --end 2025-09-30 \
            --drift_threshold 2.0 \
            --cooldown_days 7

      # Validate all required output files exist
      - name: Validate outputs
        run: |
          echo "Checking required output files..."
          test -f data/processed/metrics.csv            && echo "✅ metrics.csv" || (echo "❌ metrics.csv missing" && exit 1)
          test -f data/processed/inventory_recommendations.csv && echo "✅ inventory_recommendations.csv" || (echo "❌ inventory missing" && exit 1)
          # system_events.csv may be empty if no drift — that's acceptable
          test -f data/processed/system_events.csv      && echo "✅ system_events.csv" || echo "ℹ  system_events.csv not present (no drift events in run)"
          echo "Row counts:"
          wc -l data/processed/metrics.csv
          python3 -c "
          import pandas as pd
          m = pd.read_csv('data/processed/metrics.csv')
          print(f'  metrics rows: {len(m)}')
          print(f'  drift events: {m[\"Drift\"].sum()}')
          print(f'  SKUs: {m[\"SKU\"].nunique()}')
          "

      # Start API and verify endpoints respond
      - name: Test API endpoints
        run: |
          uvicorn api:app --host 127.0.0.1 --port 8000 &
          sleep 6
          echo "Testing /skus..."
          curl --fail --silent http://127.0.0.1:8000/skus | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'  /skus returned {len(d)} SKUs')"
          echo "Testing /metrics..."
          curl --fail --silent "http://127.0.0.1:8000/metrics?sku=APPL-001&start=2025-07-01&end=2025-09-30" > /dev/null && echo "  /metrics OK"
          echo "Testing /inventory..."
          curl --fail --silent "http://127.0.0.1:8000/inventory?end=2025-09-30" > /dev/null && echo "  /inventory OK"
          echo "Testing /monitoring..."
          curl --fail --silent http://127.0.0.1:8000/monitoring | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'  avg_mae={d[\"avg_mae\"]}')"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('dashboard/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install frontend dependencies
        run: cd dashboard && npm install

      - name: Build frontend
        run: cd dashboard && CI=false npm run build

      - name: Package deployment bundle
        run: |
          mkdir -p deploy_bundle
          cp api.py pipeline.py requirements.txt deploy_bundle/
          cp -r src deploy_bundle/
          cp -r data deploy_bundle/
          cp -r dashboard/build deploy_bundle/frontend

      - name: Upload deployable bundle
        uses: actions/upload-artifact@v4
        with:
          name: full-app-deployment
          path: deploy_bundle/
