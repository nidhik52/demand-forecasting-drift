name: Full CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: |
          python pipeline.py --start 2025-07-01 --end 2025-07-05

      - name: Validate outputs
        run: |
          test -f data/processed/metrics.csv
          test -f data/processed/system_events.csv

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: |
          cd dashboard
          npm install

      - name: Build app
        run: |
          cd dashboard
          CI=false npm run build