name: Drift Detection Pipeline

on:
  schedule:
    - cron: '0 2 * * *'
  push:
    branches: [ main ]
    paths:
      - 'data/processed/**'
      - 'src/**'
      - 'requirements.txt'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  run-drift-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache cmdstan
        id: cache-cmdstan
        uses: actions/cache@v4
        with:
          path: ~/.cmdstan
          key: cmdstan-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install cmdstan (required by Prophet, only if not cached)
        if: steps.cache-cmdstan.outputs.cache-hit != 'true'
        run: |
          python -c "import cmdstanpy; cmdstanpy.install_cmdstan()"

      - name: Restore trained models cache
        id: cache-models
        uses: actions/cache@v4
        with:
          path: models/
          key: models-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            models-${{ runner.os }}-

      - name: Verify file structure
        run: |
          echo "=== Checking required files ==="
          ls src/drift_detection/
          ls src/retraining/
          ls data/processed/ 2>/dev/null || echo "No processed data yet"
          echo "=== File check complete ==="

      - name: Generate processed data
        run: |
          echo "Generating processed demand time series from raw data..."
          python src/data/master_data_pipeline.py
          echo "Generated: $(wc -l < data/processed/final_demand_series.csv) rows in final_demand_series.csv"

      - name: Run drift detection check
        id: drift_check
        continue-on-error: true
        run: |
          python src/drift_detection/run_drift_check.py \
            --data data/processed/final_demand_series.csv \
            --days 61 \
            --threshold 1.5 \
            --model-dir models/ \
            --output reports/drift_report.json

      - name: Read drift report
        id: read_report
        if: always()
        run: |
          if [ -f reports/drift_report.json ]; then
            echo "=== Drift Report ==="
            cat reports/drift_report.json
            DRIFT=$(python3 -c "import json; r=json.load(open('reports/drift_report.json')); print(str(r['drift_detected']).lower())")
            echo "DRIFT_DETECTED=$DRIFT" >> $GITHUB_OUTPUT
          else
            echo "No drift report found"
            echo "DRIFT_DETECTED=false" >> $GITHUB_OUTPUT
          fi

      - name: Run retraining if drift detected
        if: steps.read_report.outputs.DRIFT_DETECTED == 'true'
        run: |
          echo "Drift detected — triggering retraining..."
          python src/drift_detection/run_drift_check.py \
            --data data/processed/final_demand_series.csv \
            --days 61 \
            --threshold 1.5 \
            --retrain \
            --model-dir models/ \
            --output reports/drift_report_with_retrain.json

      - name: Upload drift report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report-${{ github.run_number }}
          path: reports/drift_report*.json
          retention-days: 30

      - name: Notify on drift detected
        if: steps.read_report.outputs.DRIFT_DETECTED == 'true'
        run: |
          echo "::warning title=Drift Detected::Concept drift detected. Check drift report artifact."
          python3 -c "
          import json
          r = json.load(open('reports/drift_report.json'))
          for cat in r.get('drifted_categories', []):
            info = r['categories'][cat]
            print(f'  {cat}: short={info[\"short_ratio\"]}x  long={info[\"long_ratio\"]}x  drift_days={info[\"drift_days\"]}/{info[\"eval_days\"]}'
          )
          "

      - name: Pipeline summary
        if: always()
        run: |
          echo "Run date: $(date)"
          echo "Drift detected: ${{ steps.read_report.outputs.DRIFT_DETECTED }}"
