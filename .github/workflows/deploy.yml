name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

  # -------------------------
  # BACKEND BUILD + TEST
  # -------------------------
  backend:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # Cache pip dependencies
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # Basic sanity check
      - name: Check API starts
        run: |
          python -c "import fastapi, pandas, numpy; print('Backend OK')"

  # -------------------------
  # FRONTEND BUILD
  # -------------------------
  frontend:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # Cache node modules
      - name: Cache Node
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('dashboard/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install frontend deps
        run: |
          cd dashboard
          npm install

      - name: Build frontend
        run: |
          cd dashboard
          npm run build

  # -------------------------
  # OPTIONAL: PIPELINE CHECK
  # -------------------------
  pipeline-test:

    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run small pipeline test
        run: |
          python pipeline.py --start 2025-07-01 --end 2025-07-03