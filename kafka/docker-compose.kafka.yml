# ─────────────────────────────────────────────────────────────────────────────
# Kafka Real-Time Simulation Stack
# ─────────────────────────────────────────────────────────────────────────────
# Starts three services:
#   zookeeper   :2181  — Kafka coordination
#   kafka        :9092  — Kafka broker  (advertised on localhost:9092)
#   kafka-ui     :8080  — Kafka UI (Redpanda-style web console)
#
# Usage:
#   docker compose -f kafka/docker-compose.kafka.yml up -d
#   # then in two separate terminals:
#   python kafka/producer.py --speed 200
#   python kafka/consumer.py
#
#   Open http://localhost:8080  to browse topics + messages in real time.
#
# ─────────────────────────────────────────────────────────────────────────────

version: '3.8'

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: drift_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout:  5s
      retries:  5

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: drift_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                         1
      KAFKA_ZOOKEEPER_CONNECT:                 zookeeper:2181
      # Advertise on localhost so producer/consumer outside Docker can connect
      KAFKA_ADVERTISED_LISTENERS:              PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:    PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:        PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:  1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:         "true"
      KAFKA_LOG_RETENTION_HOURS:               2        # keep messages only 2h for demo
      KAFKA_LOG_SEGMENT_BYTES:                 104857600
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout:  10s
      retries:  10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: drift_kafka_ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME:              local-drift
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS:  kafka:29092
      # Show message content decoded as string (JSON)
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT
