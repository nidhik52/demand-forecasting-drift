# This is a Render service configuration file for the demand-api web service. Using this is optional, but it allows you to specify how your service should be built and run on Render. For more information, see https://render.com/docs/render-yaml.
# We are using Docker for full deployment control, so this file is not strictly necessary. However, it can be useful for local development and testing.
services:
  - type: web
    name: demand-api
    runtime: python
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt
      pip install tqdm
      pip install mlflow
      if [ "${ENABLE_PROPHET}" = "1" ]; then
        pip install -r requirements-prophet.txt
      fi
    startCommand: uvicorn api:app --host 0.0.0.0 --port 10000