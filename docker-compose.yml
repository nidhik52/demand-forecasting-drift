services:
  retail-system:
    build:
      context: .
      dockerfile: Dockerfile
    image: retail-system:latest
    container_name: retail-system
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    develop:
      watch:
        - action: rebuild
          path: Dockerfile
        - action: rebuild
          path: requirements.txt
        - action: rebuild
          path: api.py
        - action: rebuild
          path: pipeline.py
        - action: rebuild
          path: src
        - action: rebuild
          path: dashboard/src
        - action: rebuild
          path: dashboard/public
        - action: rebuild
          path: dashboard/package.json
        - action: rebuild
          path: dashboard/package-lock.json