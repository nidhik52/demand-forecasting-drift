services:

  # ── Python ML pipeline + FastAPI backend ────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: demand-api
    ports:
      - "8000:8000"
    volumes:
      # Mount data and model directories so the pipeline can read/write them
      - ./data:/app/data
      - ./models:/app/models
      - ./mlruns:/app/mlruns
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    restart: unless-stopped

  # ── React dashboard (Nginx) ──────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: demand-dashboard
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  # ── MLflow tracking server ───────────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: mlflow-server
    working_dir: /mlflow
    command: >
      bash -c "pip install mlflow --quiet &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri /mlflow/mlruns
               --default-artifact-root /mlflow/mlartifacts"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
      - ./mlartifacts:/mlflow/mlartifacts
    restart: unless-stopped
