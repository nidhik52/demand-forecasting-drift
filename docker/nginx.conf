server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Proxy API calls to the FastAPI service so the browser doesn't hit CORS
    location /forecast  { proxy_pass http://api:8000; }
    location /drift     { proxy_pass http://api:8000; }
    location /inventory { proxy_pass http://api:8000; }

    # Serve the React SPA — fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
