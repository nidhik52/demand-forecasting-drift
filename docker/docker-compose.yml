# ─────────────────────────────────────────────────────────────
# docker-compose.yml — Full Stack Deployment
# ─────────────────────────────────────────────────────────────
# FW7 IMPLEMENTATION — Containerised, Autoscaled Deployment
#
# Starts 4 services:
#   api        — FastAPI inference server  (port 8000)
#   dashboard  — Streamlit frontend        (port 8501)
#   mlflow     — MLflow experiment UI      (port 5000)
#   airflow    — Airflow scheduler + UI    (port 8080)
#
# USAGE
#   # Start all services
#   docker compose -f docker/docker-compose.yml up --build
#
#   # Scale API to 3 instances (with load balancer)
#   docker compose -f docker/docker-compose.yml up --scale api=3
#
#   # Stop everything
#   docker compose -f docker/docker-compose.yml down
#
# VOLUMES
#   mlruns/  — shared between api and mlflow so both read/write same experiments
#   data/    — shared so api can read processed demand data
# ─────────────────────────────────────────────────────────────

version: '3.9'

services:

  # ── FastAPI Inference Server ────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: demand-forecasting-api:latest
    container_name: demand_api
    ports:
      - "8000:8000"
    volumes:
      - ../mlruns:/app/mlruns          # shared MLflow runs
      - ../data:/app/data              # live data access
      - ../reports:/app/reports        # output figures/logs
    environment:
      - MLFLOW_TRACKING_URI=file:///app/mlruns
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    depends_on:
      - mlflow

  # ── Streamlit Dashboard ─────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    image: demand-forecasting-dashboard:latest
    container_name: demand_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ../mlruns:/app/mlruns
      - ../data:/app/data
      - ../reports:/app/reports
    environment:
      - API_URL=http://api:8000
      - MLFLOW_TRACKING_URI=file:///app/mlruns
    restart: unless-stopped
    depends_on:
      - api

  # ── MLflow Experiment Tracking UI ───────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: demand_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ../mlruns:/mlruns
    command: >
      bash -c "pip install mlflow --quiet &&
               mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri file:///mlruns"
    restart: unless-stopped

  # ── Apache Airflow (scheduler + webserver) ──────────────
  # FW3: This runs the drift_pipeline DAG daily
  airflow:
    image: apache/airflow:2.9.1-python3.11
    container_name: demand_airflow
    ports:
      - "8080:8080"
    volumes:
      - ../dags:/opt/airflow/dags       # our DAG files
      - ../mlruns:/app/mlruns
      - ../data:/app/data
      - airflow_logs:/opt/airflow/logs
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=demand-forecasting-secret-key
      - PYTHONPATH=/app
    command: >
      bash -c "airflow db migrate &&
               airflow users create --username admin --password admin
                 --firstname Admin --lastname User --role Admin --email admin@example.com &&
               airflow scheduler & airflow webserver --port 8080"
    restart: unless-stopped

volumes:
  airflow_logs:
